apiVersion: apps/v1
kind: Deployment
metadata:
  name: abc-company-website
  labels:
    app: corporate-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: corporate-web
  template:
    metadata:
      labels:
        app: corporate-web
    spec:
      containers:
      - name: abc-company-website
        image: abctechnologies-web:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
